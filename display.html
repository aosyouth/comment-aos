<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOS Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #f5f7ff 0%, #eef2ff 100%);
            min-height: screen;
        }

        /* ดีไซน์ฟองสบู่แบบ Glassmorphism */
        .comment-bubble {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 
                inset 0 10px 20px rgba(255,255,255,0.4),
                0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* เพิ่มแสงเงาให้ดูนูนเหมือนฟองสบู่ */
        .comment-bubble::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 20%;
            height: 12%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: rotate(-45deg);
        }

        .comment-bubble:hover {
            transform: scale(1.1) !important;
            z-index: 100;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            backdrop-filter: blur(0px);
            border-color: rgba(255, 255, 255, 1);
        }

        /* Container จัดวางฟองสบู่ */
        #commentsContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            min-height: 70vh;
            padding: 3rem;
        }

        /* แอนิเมชั่นการลอย */
        @keyframes bubbleFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(15px, -25px) scale(1.03); }
            66% { transform: translate(-15px, -15px) scale(0.97); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .animate-bubble {
            animation: bubbleFloat 7s ease-in-out infinite;
        }

        .bubble-text {
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col items-center mb-12 text-center">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-4">
                ความคิดเห็น AOS
            </h1>

        </div>

        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>

        <div id="commentsContainer">
            </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxNUZxRPMC9ADce5AodXgVtSMDgKCU7iKFqVFJSpwqeybmsNMAcVTJYykT1pbCuaDiQ-g/exec';

        // โทนสีแบบใสๆ (Soft Pastel Glass)
        const bubbleStyles = [
            { bg: 'rgba(219, 234, 254, 0.6)', text: '#1e40af', border: 'rgba(191, 219, 254, 0.8)' },
            { bg: 'rgba(252, 231, 243, 0.6)', text: '#9d174d', border: 'rgba(251, 207, 232, 0.8)' },
            { bg: 'rgba(243, 232, 255, 0.6)', text: '#6b21a8', border: 'rgba(233, 213, 255, 0.8)' },
            { bg: 'rgba(254, 243, 199, 0.6)', text: '#92400e', border: 'rgba(252, 211, 77, 0.8)' },
            { bg: 'rgba(209, 250, 229, 0.6)', text: '#065f46', border: 'rgba(167, 243, 208, 0.8)' },
            { bg: 'rgba(224, 242, 254, 0.6)', text: '#0369a1', border: 'rgba(186, 230, 253, 0.8)' }
        ];

        async function fetchComments() {
            const container = document.getElementById('commentsContainer');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(`${WEB_APP_URL}?action=getComments`);
                const data = await response.json();
                loading.classList.add('hidden');
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="text-gray-400">ยังไม่มีข้อมูลในระบบ</p>';
                    return;
                }

                // 1. นับจำนวนคำที่ซ้ำกัน
                const counts = data.reduce((acc, item) => {
                    const txt = item.text.trim();
                    acc[txt] = (acc[txt] || 0) + 1;
                    return acc;
                }, {});

                // 2. แปลงเป็น Array เพื่อเรียงลำดับ (ล่าสุดอยู่หน้า แต่คำซ้ำโชว์ใบเดียว)
                // เราจะดึงรายการคำที่ไม่ซ้ำกันมาแสดง
                const uniqueTexts = Object.keys(counts);

                container.innerHTML = uniqueTexts.map((text, index) => {
                    const count = counts[text];
                    const style = bubbleStyles[index % bubbleStyles.length];
                    
                    // 3. คำนวณขนาด (Base 140px + เพิ่มความใหญ่ตามจำนวนซ้ำ)
                    const size = Math.min(140 + (count - 1) * 45, 380);
                    
                    // สุ่มจังหวะแอนิเมชั่น
                    const duration = (Math.random() * 4 + 6).toFixed(2);
                    const delay = (Math.random() * -10).toFixed(2);

                    return `
                        <div class="animate-bubble" style="
                            animation-duration: ${duration}s;
                            animation-delay: ${delay}s;
                        ">
                            <div class="comment-bubble" style="
                                width: ${size}px;
                                height: ${size}px;
                                background-color: ${style.bg};
                                border-color: ${style.border};
                                color: ${style.text};
                            ">
                                <div class="flex flex-col items-center justify-center p-6 w-full">
                                    <span class="bubble-text font-medium leading-tight ${size < 180 ? 'text-sm' : 'text-base'}">
                                        ${escapeHtml(text)}
                                    </span>
                                    ${count > 1 ? `
                                        <div class="mt-2 px-2 py-0.5 bg-white/40 rounded-full text-[10px] font-bold">
                                            × ${count}
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                loading.innerHTML = `<p class="text-red-500 font-medium">เกิดข้อผิดพลาด: ${error.message}</p>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // โหลดข้อมูลครั้งแรก
        window.onload = fetchComments;
        
        // อัปเดตข้อมูลทุกๆ 10 วินาที (Optional)
        setInterval(fetchComments, 10000);
    </script>
</body>
</html>
